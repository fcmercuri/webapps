name: Add Internal Links

on:
  workflow_dispatch: # Run manually from GitHub Actions tab

jobs:
  add-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run internal links script
        run: node add-internal-links.js
